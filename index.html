<!DOCTYPE html>
<html>
<head>
  <title>Rasel Admin Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #111827;
      position: fixed;
      padding: 20px;
    }

    .sidebar h2 {
      color: #22c55e;
    }

    .sidebar p {
      margin: 15px 0;
      color: #cbd5e1;
      cursor: pointer;
    }

    /* Main */
    .main {
      margin-left: 240px;
      padding: 20px;
    }

    /* Topbar */
    .topbar {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    /* Cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .card h3 {
      color: #facc15;
    }

    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      .main {
        margin-left: 0;
      }
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>🌸 Rasel Admin</h2>
  <p>Dashboard</p>
  <p>Orders</p>
  <p>Users</p>
  <p>Settings</p>
</div>

<div class="main">

  <div class="topbar">
    <h1>📊 Dashboard Overview</h1>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Total Users</h3>
      <p>120</p>
    </div>

    <div class="card">
      <h3>Orders</h3>
      <p>45</p>
    </div>

    <div class="card">
      <h3>Earnings</h3>
      <p>৳ 5,500</p>
    </div>

    <div class="card">
      <h3>Pending Orders</h3>
      <p>8</p>
    </div>

    <div class="card">
      <h3>Completed Orders</h3>
      <p>37</p>
    </div>

    <div class="card">
      <h3>Control Panel</h3>
      <button onclick="alert('System Updated!')">
        Update System
      </button>
    </div>

  </div>

</div>

</body>
</html>
